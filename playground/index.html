<!doctype html>
<html>
  <head>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
    <link rel="alternate icon" href="/favicon.ico" />
    <link rel="stylesheet" href="../playground/style.min.css" />
    <title>Sutairu Playground</title>
    <style>
      /*
      body {
        font-family: sans-serif;
      }
        */



      textarea,
      pre {
        outline: none;
        /* font-size: 16px; */
      }

      textarea {
        background: #1e1e1e;
        color: #d4d4d4;
        font-family: monospace;
        resize: none;
      }

      pre {
        background: #f8f9fa;
        color: #212529;
        border-top: 2px solid #ddd; /* Changed from left to top border */
      }

      .label {
        padding: 4px 12px;
        font-size: 11px;
        font-weight: bold;
        letter-spacing: 1px;
        color: white;
        background: rgba(85, 85, 85, 0.8);
        pointer-events: none; /* Allows clicking "through" the label to the textarea */
        z-index: 10;
      }
    </style>
  </head>
  <body class="m-0 flex-y h-100vh">
    <div class="section pos-rel h-50vh ov-hidden flex-y">
      <div class="label pos-abs top-0 left-0">INPUT (SPACE SEPARATED)</div>
      <textarea id="input" class="grow-1 m-0 b-0 p-4 pt-8" placeholder="m-3 !bg-blue-123/83 m-5"></textarea>
    </div>

    <div class="section pos-rel h-50vh ov-hidden flex-y">
      <div class="label pos-abs top-0 left-0">GENERATED CSS</div>
      <pre id="output" class="grow-1 ov-auto ff-mono m-0 b-0 lh-1.5 p-4 pt-8"></pre>
    </div>

    <script type="module">
      // Points to your actual source logic!
      import { compileCSS } from "../src/compiler.js";

      const input = document.getElementById("input");
      const output = document.getElementById("output");
      input.addEventListener("input", async () => {
        const classes = input.value.split(/\s+/).filter(Boolean);
        const css = await compileCSS(classes);
        output.textContent = css;
      });
    </script>
  </body>
</html>
